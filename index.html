<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="晴れタスク">
  <title>晴れタスク - タスク達成で空が晴れる</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    /* =============================================
       晴れタスク - メインスタイルシート（完全版）
       ============================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --sky-cloudy: linear-gradient(180deg, #8B9CB0 0%, #B0BEC5 40%, #CFD8DC 100%);
      --sky-partly: linear-gradient(180deg, #6B8BA4 0%, #90A4AE 40%, #B0C4CE 100%);
      --sky-clearing: linear-gradient(180deg, #4A7FA8 0%, #64B5E0 50%, #87CEEB 100%);
      --sky-blue: linear-gradient(180deg, #2C7BB6 0%, #4AABDF 50%, #73C8F0 100%);
      --sky-sunny: linear-gradient(180deg, #1565C0 0%, #42A5F5 50%, #64B5F6 100%);
      --white: #FFFFFF;
      --text-primary: #1A2634;
      --text-secondary: #546E7A;
      --text-light: #90A4AE;
      --accent-blue: #1976D2;
      --danger: #E53935;
      --success: #43A047;
      --card-bg: rgba(255,255,255,0.92);
      --card-shadow: 0 2px 12px rgba(0,0,0,0.12);
      --border-radius: 16px;
      --header-height: 50px;
      --font-size-sm: 14px;
    }

    body {
      font-family: -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--sky-cloudy);
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background 1.5s ease;
      padding-bottom: 40px;
    }

    body.weather-0   { background: var(--sky-cloudy); }
    body.weather-25  { background: var(--sky-partly); }
    body.weather-50  { background: var(--sky-clearing); }
    body.weather-75  { background: var(--sky-blue); }
    body.weather-100 { background: var(--sky-sunny); }

    /* トースト通知 */
    #toast {
      position: fixed;
      top: calc(var(--header-height) + 10px);
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: #fff;
      z-index: 500;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      transition: opacity 0.4s ease, transform 0.4s ease;
      opacity: 0;
    }

    #toast.toast-visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.toast-hidden { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    #toast.toast-info    { background: rgba(25, 118, 210, 0.92); }
    #toast.toast-success { background: rgba(67, 160, 71, 0.92); }
    #toast.toast-danger  { background: rgba(229, 57, 53, 0.92); }
    #toast.toast-warning { background: rgba(255, 152, 0, 0.92); }

    /* あなたの高機能デザインのレイアウト */
    .container { padding: 20px; max-width: 500px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 20px; border-radius: var(--border-radius); box-shadow: var(--card-shadow); margin-bottom: 20px; }
    .toast-capsule { background: #333; color: white; padding: 4px 12px; border-radius: 12px; display: inline-block; font-size: 12px; margin-bottom: 10px; }
    label { display: block; margin-top: 10px; font-weight: bold; color: var(--text-secondary); font-size: 14px; }
    input[type="text"], input[type="date"], input[type="time"], select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background: white; }
    button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 8px; background: #1976D2; color: white; font-weight: bold; font-size: 16px; border: none; cursor: pointer; }
    .category-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .cat-btn { width: auto; padding: 8px 16px; margin: 0; background: #e0e0e0; color: #333; border-radius: 20px; font-size: 14px; }
    .cat-btn.active { background: #1976D2; color: white; }
    .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .task-main { display: flex; align-items: center; gap: 10px; }
    .delete-btn { width: auto; background: var(--danger); margin: 0; padding: 6px 12px; font-size: 14px; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 12px; color: white; background: #78909c; }
  </style>
</head>
<body class="weather-0">

  <div class="container">
    <div class="card">
      <div class="toast-capsule">✏️ 更新しました</div>
      <h2>☀️ ハレタス</h2>
      <p>タスクをこなして空を晴れにしよう！</p>
      
      <label>メモ</label>
      <input type="text" id="taskInput" placeholder="フィギュア周りなど...">

      <label>日付</label>
      <input type="date" id="taskDate">

      <label>時間</label>
      <input type="time" id="taskTime">

      <label>カテゴリ</label>
      <div class="category-group">
        <button class="cat-btn" onclick="setCategory('学校')">🎓 学校</button>
        <button class="cat-btn active" onclick="setCategory('プライベート')">😊 プライベート</button>
        <button class="cat-btn" onclick="setCategory('健康')">💪 健康</button>
        <button class="cat-btn" onclick="setCategory('連絡')">📞 連絡</button>
      </div>

      <label>通知</label>
      <select id="notificationOffset">
        <option value="5">5分前</option>
        <option value="10">10分前</option>
        <option value="15">15分前</option>
        <option value="30">30分前</option>
        <option value="0">時間通り</option>
      </select>

      <button onclick="addTask()">保存する</button>
    </div>

    <div class="card">
      <h3>タスク一覧</h3>
      <div id="taskList"></div>
    </div>
  </div>

  <script>
    let toastTimer = null;
    let selectedCategory = 'プライベート';

    function showToast(msg, type = 'info', duration = 3000) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        document.body.appendChild(toast);
      }
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'toast-visible toast-' + type;
      toastTimer = setTimeout(() => { toast.className = 'toast-hidden'; }, duration);
    }

    function setCategory(cat) {
      selectedCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(cat));
      });
    }

    // --- プッシュ通知の設定 ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }

    function requestPermission() {
      if ('Notification' in window && Notification.permission !== 'granted') {
        Notification.requestPermission();
      }
    }
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(requestPermission, 2000);
      // デフォルトの日付を今日にする
      document.getElementById('taskDate').value = new Date().toISOString().split('T')[0];
      updateInterface();
      setInterval(checkScheduledNotifications, 30000); // 30秒ごとに時間チェック
    });

    // --- タスク管理ロジック ---
    let tasks = JSON.parse(localStorage.getItem('haretasu_tasks')) || [];

    function saveTasks() {
      localStorage.setItem('haretasu_tasks', JSON.stringify(tasks));
      updateInterface();
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const date = document.getElementById('taskDate').value;
      const time = document.getElementById('taskTime').value;
      const offset = parseInt(document.getElementById('notificationOffset').value);

      if (!input.value.trim() || !date || !time) {
        showToast('入力項目が足りません', 'warning');
        return;
      }

      const taskTargetTime = new Date(`${date}T${time}`).getTime();

      tasks.push({
        id: Date.now(),
        text: input.value,
        date: date,
        time: time,
        category: selectedCategory,
        offset: offset,
        targetTime: taskTargetTime,
        notified: false,
        completed: false
      });

      input.value = '';
      saveTasks();
      showToast('タスクを保存しました！', 'success');
    }

    function toggleTask(id) {
      tasks = tasks.map(t => {
        if (t.id === id) {
          const next = !t.completed;
          if (next) showToast('タスク完了！空が晴れていきます☀️', 'success');
          return { ...t, completed: next };
        }
        return t;
      });
      saveTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      showToast('削除しました', 'danger');
    }

    // --- 🕒 5分前などのスケジュール通知エンジン ---
    function checkScheduledNotifications() {
      const now = Date.now();
      tasks = tasks.map(t => {
        if (!t.completed && !t.notified && t.targetTime) {
          const notifyTime = t.targetTime - (t.offset * 60 * 1000);
          if (now >= notifyTime) {
            // 本物のプッシュ通知をスマホに飛ばす！
            if ('Notification' in window && Notification.permission === 'granted') {
              new Notification('ハレタス通知', {
                body: `「${t.text}」の${t.offset === 0 ? '時間' : t.offset + '分前'}になりました！`,
                icon: './icon-512.png'
              });
            }
            showToast(`時間です: ${t.text}`, 'info');
            return { ...t, notified: true };
          }
        }
        return t;
      });
      localStorage.setItem('haretasu_tasks', JSON.stringify(tasks));
    }

    function updateInterface() {
      const list = document.getElementById('taskList');
      list.innerHTML = '';

      if (tasks.length === 0) {
        list.innerHTML = '<p style="color:var(--text-light); text-align:center;">タスクはありません</p>';
        document.body.className = 'weather-0';
        return;
      }

      const completedCount = tasks.filter(t => t.completed).length;
      const progress = (completedCount / tasks.length) * 100;

      tasks.forEach(t => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = `
          <div class="task-main">
            <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask(${t.id})">
            <div>
              <span style="${t.completed ? 'text-decoration: line-through; color: var(--text-light);' : ''}">${t.text}</span>
              <div style="font-size:11px; color:var(--text-secondary); margin-top:2px;">
                <span class="badge">${t.category}</span> ${t.time} (${t.offset}分前通知)
              </div>
            </div>
          </div>
          <button class="delete-btn" onclick="deleteTask(${t.id})">削除</button>
        `;
        list.appendChild(item);
      });

      if (progress === 0) document.body.className = 'weather-0';
      else if (progress <= 25) document.body.className = 'weather-25';
      else if (progress <= 50) document.body.className = 'weather-50';
      else if (progress <= 75) document.body.className = 'weather-75';
      else document.body.className = 'weather-100';
    }
  </script>
</body>
</html>
